<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f1c;--bg2:#13132a;--surface:#161630;
  --ghost:#ddd9e7;--dim:#a8a3c0;--muted:#6a6590;
  --violet:#b89fff;--teal:#4de8c2;
  --line:rgba(184,159,255,0.13);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ghost);font-family:"Shippori Mincho",serif;overflow-x:hidden;}

/* ── BG VIDEO ── */
.bg-video-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-video-wrap video{width:100%;height:100%;object-fit:cover;opacity:0.15;filter:brightness(0.5) saturate(0.6);}
.bg-video-wrap::after{content:"";position:absolute;inset:0;background:rgba(15,15,28,0.65);}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3.5rem;background:rgba(15,15,28,0.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);}
nav::after{content:"";position:absolute;bottom:-3px;left:3.5rem;right:3.5rem;height:1px;background:linear-gradient(90deg,transparent,rgba(77,232,194,0.2) 40%,rgba(184,159,255,0.16) 60%,transparent);}
.logo{font-family:"Cinzel",serif;font-weight:600;font-size:1.25rem;letter-spacing:0.2em;color:var(--ghost);text-decoration:none;display:flex;align-items:center;gap:0.4rem;}
.logo-cross{color:var(--violet);font-size:0.8rem;font-family:"Raleway",sans-serif;font-weight:300;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-family:"Raleway",sans-serif;font-weight:300;font-size:0.7rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s;position:relative;}
.nav-links a::after{content:"";position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--teal);transition:width 0.35s;}
.nav-links a:hover,.nav-active{color:var(--ghost)!important;}
.nav-links a.nav-active::after,.nav-links a:hover::after{width:100%;}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(18px);transition:opacity 0.75s cubic-bezier(.22,1,.36,1),transform 0.75s cubic-bezier(.22,1,.36,1);transition-delay:var(--delay,0ms);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ── PAGE HEADER ── */
.page-header{position:relative;z-index:1;padding:100px 3.5rem 32px;max-width:1300px;margin:0 auto;}
.ph-eyebrow{font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;font-size:0.64rem;letter-spacing:0.52em;color:var(--violet);text-transform:uppercase;display:flex;align-items:center;gap:0.55rem;margin-bottom:0.5rem;}
.ph-eyebrow::before{content:"✦";font-size:0.5rem;}
.ph-h1{font-family:"Cinzel",serif;font-weight:600;font-size:clamp(1.8rem,3.5vw,3.2rem);letter-spacing:0.1em;color:var(--ghost);margin-bottom:0.35rem;}
.ph-sub{font-family:"Shippori Mincho",serif;font-size:0.8rem;letter-spacing:0.42em;color:var(--muted);margin-bottom:1.2rem;}
.ph-count{font-family:"Raleway",sans-serif;font-weight:300;font-size:0.66rem;letter-spacing:0.2em;color:var(--muted);}
.ph-count em{color:var(--violet);font-style:normal;}

/* ── CTRL BAR ── */
.ctrl-bar{position:sticky;top:62px;z-index:200;background:rgba(15,15,28,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0.7rem 3.5rem;display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;}
.sort-btn{font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;font-size:0.64rem;letter-spacing:0.18em;text-transform:uppercase;padding:0.3rem 0.85rem;border:1px solid var(--line);color:var(--muted);background:transparent;cursor:pointer;transition:all 0.25s;white-space:nowrap;}
.sort-btn:hover,.sort-btn.active{border-color:var(--violet);color:var(--violet);background:rgba(184,159,255,0.06);}
.favorite-filter-btn{display:flex;align-items:center;gap:0.35rem;}
.favorite-filter-btn svg{width:13px;height:13px;fill:currentColor;}
.favorite-filter-btn.active{border-color:var(--teal);color:var(--teal);background:rgba(77,232,194,0.06);}
.ctrl-sep{width:1px;height:16px;background:var(--line);flex-shrink:0;}
.search-box{font-family:"Raleway",sans-serif;font-weight:300;font-size:0.7rem;letter-spacing:0.12em;padding:0.3rem 0.85rem;border:1px solid var(--line);color:var(--ghost);background:transparent;outline:none;transition:border-color 0.25s;flex:1;min-width:140px;max-width:220px;}
.search-box::placeholder{color:var(--muted);font-style:italic;}
.search-box:focus{border-color:var(--violet);}
.count-badge{font-family:"Raleway",sans-serif;font-weight:300;font-size:0.6rem;letter-spacing:0.14em;color:var(--muted);margin-left:auto;}
.count-badge em{color:var(--violet);font-style:normal;}

/* ── GRID ── */
.dc-main{position:relative;z-index:1;padding:0 3.5rem 100px;max-width:1300px;margin:0 auto;}
#dcGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:0;background:transparent;border:1px solid var(--line);
}

/* ── CARD ── */
.dc-card{
  background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;overflow:visible;
  transition:background 0.3s;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.dc-card::before{
  content:"";position:absolute;top:0;left:0;
  width:0;height:2px;
  background:linear-gradient(90deg,var(--violet),var(--teal));
  transition:width 0.4s;z-index:2;
}
.dc-card:hover::before{width:100%;}
.dc-card:hover{background:rgba(184,159,255,0.045);}
.dc-card.is-current{
  z-index:3;
  background:rgba(184,159,255,0.065);
  box-shadow:inset 0 0 0 1px rgba(184,159,255,0.7),0 0 20px rgba(77,232,194,0.12);
}
.dc-card.is-current::before{width:100%;height:3px;}
.dc-card.is-current .dc-thumb img{opacity:1;transform:scale(1.025);}
.dc-card.is-current .dc-title{color:var(--ghost);}
.dc-card.is-playing{animation:dcPlayingGlow 2.4s ease-in-out infinite;}
@keyframes dcPlayingGlow{
  0%,100%{box-shadow:inset 0 0 0 1px rgba(184,159,255,0.55),0 0 14px rgba(184,159,255,0.1);}
  50%{box-shadow:inset 0 0 0 1px rgba(77,232,194,0.75),0 0 26px rgba(77,232,194,0.2);}
}

/* ── MEDIA ── */
.dc-media{width:100%;overflow:hidden;background:var(--bg2);position:relative;}

/* YTあり */
.dc-card.playing .dc-info{border-top:1px solid var(--violet);}
.dc-thumb{
  width:100%;aspect-ratio:16/9;
  cursor:pointer;position:relative;display:block;overflow:hidden;
  background:var(--bg2);
  border:none;padding:0;
}
.dc-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s,opacity 0.3s;opacity:0.82;}
.dc-card:hover .dc-thumb img{transform:scale(1.03);opacity:0.95;}
.dc-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(15,15,28,0.28);transition:background 0.3s;
}
.dc-card:hover .dc-play{background:rgba(15,15,28,0.1);}
.dc-play span{
  width:40px;height:40px;border-radius:50%;
  background:rgba(184,159,255,0.22);border:1px solid rgba(184,159,255,0.55);
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;color:var(--ghost);transition:all 0.3s;
}
.dc-card:hover .dc-play span{background:rgba(184,159,255,0.38);transform:scale(1.08);}
.dc-card.is-current .dc-play{background:rgba(15,15,28,0.08);}
.dc-card.is-current .dc-play span{opacity:0;transform:scale(0.8);}
.dc-now-playing{
  position:absolute;left:0.65rem;bottom:0.55rem;z-index:3;
  height:24px;display:flex;align-items:flex-end;gap:3px;
  padding:5px 7px;background:rgba(10,10,20,0.78);
  border:1px solid rgba(184,159,255,0.35);
  opacity:0;transform:translateY(4px);transition:opacity 0.25s,transform 0.25s;
  pointer-events:none;
}
.dc-card.is-current .dc-now-playing{opacity:1;transform:translateY(0);}
.dc-now-playing span{
  display:block;width:2px;height:4px;background:var(--teal);
  transform-origin:bottom;animation:dcWave 0.72s ease-in-out infinite alternate;
  animation-play-state:paused;
}
.dc-card.is-playing .dc-now-playing span{animation-play-state:running;}
.dc-now-playing span:nth-child(2){animation-delay:-0.5s;}
.dc-now-playing span:nth-child(3){animation-delay:-0.22s;}
.dc-now-playing span:nth-child(4){animation-delay:-0.62s;}
.dc-now-playing span:nth-child(5){animation-delay:-0.34s;}
@keyframes dcWave{from{height:4px;}to{height:15px;}}
@media(prefers-reduced-motion:reduce){.dc-card.is-playing,.dc-now-playing span{animation:none;}.dc-now-playing span:nth-child(2n){height:11px;}}
.dc-yt-label{
  position:absolute;bottom:0.5rem;right:0.6rem;
  font-family:"Raleway",sans-serif;font-weight:300;
  font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(221,217,231,0.6);
  background:rgba(15,15,28,0.6);
  padding:0.1rem 0.4rem;
}
.dc-embed{display:none;} /* embed disabled */
.dc-embed.open{display:none;} /* disabled */
.dc-embed iframe{width:100%;aspect-ratio:16/9;display:block;border:none;}

/* YTなし → 検索リンク */
.dc-search-link{
  width:100%;aspect-ratio:16/9;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;
  text-decoration:none;
  background:rgba(15,15,28,0.5);
  transition:background 0.3s;
  position:relative;
}
.dc-search-link:hover{background:rgba(184,159,255,0.06);}
.dc-year-big{font-family:"Cinzel",serif;font-weight:900;font-size:2.2rem;color:rgba(184,159,255,0.15);letter-spacing:0.04em;}
.dc-search-hint{
  font-family:"Raleway",sans-serif;font-weight:300;
  font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);
  opacity:0;transition:opacity 0.3s;
}
.dc-search-link:hover .dc-search-hint{opacity:1;}
.dc-search-link:hover .dc-year-big{color:rgba(184,159,255,0.3);}

/* ── INFO ── */
.dc-info{padding:1rem 1.2rem 1.3rem;flex:1;display:flex;flex-direction:column;gap:0.15rem;}
.dc-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.45rem;}
.dc-date{font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;font-size:0.58rem;letter-spacing:0.25em;color:var(--teal);}
.dc-note{font-family:"Raleway",sans-serif;font-weight:300;font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--violet);border:1px solid rgba(184,159,255,0.22);padding:0.1rem 0.38rem;}
.dc-title-long{font-size:0.76rem;line-height:1.4;}
.dc-title{font-family:"Cinzel",serif;font-weight:400;font-size:0.88rem;color:var(--ghost);line-height:1.3;letter-spacing:0.05em;transition:color 0.3s;margin-bottom:0.1rem;}
.dc-card:hover .dc-title-long{font-size:0.76rem;line-height:1.4;}
.dc-title{color:var(--violet);}
.dc-collab{font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;font-size:0.62rem;letter-spacing:0.1em;color:var(--teal);}
.dc-platform{font-family:"Shippori Mincho",serif;font-size:0.7rem;line-height:1.7;color:var(--muted);letter-spacing:0.04em;}
.dc-ext-link{
  margin-top:0.4rem;
  font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;
  font-size:0.58rem;letter-spacing:0.15em;
  color:var(--teal);text-decoration:none;transition:opacity 0.2s;
  display:inline-block;
}
.dc-ext-link:hover{opacity:0.7;}

.no-results{text-align:center;padding:4rem;font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;font-size:0.9rem;color:var(--muted);letter-spacing:0.2em;grid-column:1/-1;}

/* ── FOOTER ── */
footer{position:relative;z-index:1;padding-bottom:calc(1.5rem + 36px);padding:1.5rem 3.5rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:rgba(15,15,28,0.9);}
.footer-l{font-family:"Cinzel",serif;font-weight:600;font-size:0.82rem;letter-spacing:0.2em;color:var(--muted);}
.footer-r{font-family:"Raleway",sans-serif;font-weight:300;font-size:0.55rem;letter-spacing:0.14em;color:rgba(106,101,133,0.4);}

@media(max-width:640px){
  nav{padding:1rem 1.2rem;}
  nav::after{left:1.2rem;right:1.2rem;}
  .ctrl-bar{padding:0.6rem 1.2rem;top:58px;}
  .page-header,.dc-main{padding-left:1.2rem;padding-right:1.2rem;}
  #dcGrid{grid-template-columns:repeat(2,1fr);}
}

/* ════ SHARED UX ════ */
:root{--ghost:#ddd9e7;--violet:#b89fff;--teal:#4de8c2;--muted:#6a6590;--dim:#a8a3c0;--line:rgba(184,159,255,0.13);--bg:#0f0f1c;}

/* スキップリンク */
.skip-link{position:absolute;top:-100px;left:1rem;z-index:10000;background:var(--violet);color:#fff;font-family:"Raleway",sans-serif;font-size:0.8rem;padding:0.5rem 1rem;text-decoration:none;border-radius:2px;transition:top 0.2s;}
.skip-link:focus{top:1rem;}
:focus-visible{outline:2px solid var(--teal);outline-offset:3px;}

/* ページ遷移フェード */
.page-fade{position:fixed;inset:0;z-index:8000;background:#0a0a14;opacity:0;pointer-events:none;transition:opacity 0.32s cubic-bezier(.4,0,.2,1);}
.page-fade.on{opacity:1;pointer-events:all;}

/* ナビシュリンク */
nav{transition:padding 0.3s ease,background 0.3s ease,box-shadow 0.3s ease;}
nav.scrolled{padding-top:0.7rem;padding-bottom:0.7rem;background:rgba(10,10,20,0.97);box-shadow:0 2px 20px rgba(0,0,0,0.45);}

/* ナビアクティブ */
.nav-links a.section-active{color:var(--ghost)!important;}
.nav-links a.section-active::after{width:100%;background:var(--violet);}

/* ハンバーガー */
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;margin:-6px;}
.nav-hamburger span{display:block;width:22px;height:1px;background:var(--ghost);transition:transform 0.3s,opacity 0.3s;transform-origin:center;}
.nav-hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}

/* ナビオーバーレイ */
.nav-overlay{display:none;position:fixed;inset:0;z-index:280;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px);}
.nav-overlay.open{display:block;}

/* ───────────── モバイル ───────────── */


/* スワイプインジケーター（スマホのみ） */
#swipe-indicator{
  display:none;
  position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
  z-index:100;
  font-family:"Raleway",sans-serif;font-weight:300;font-style:italic;
  font-size:0.58rem;letter-spacing:0.4em;color:rgba(221,217,231,0.35);
  text-transform:uppercase;
  animation:sw-fade 3s 2s ease forwards;
  pointer-events:none;
}
#swipe-indicator::before{content:"← ";}
#swipe-indicator::after{content:" →";}
@keyframes sw-fade{0%{opacity:1;}100%{opacity:0;}}
@media(max-width:700px){#swipe-indicator{display:block;}}

/* スクロールトップ */
#scroll-top{
  position:fixed;bottom:1.6rem;right:1.6rem;z-index:150;
  width:40px;height:40px;
  background:rgba(15,15,28,0.9);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  opacity:0;transform:translateY(6px);
  transition:opacity 0.3s,transform 0.3s,border-color 0.3s;
  pointer-events:none;border-radius:2px;
}
#scroll-top.vis{opacity:1;transform:translateY(0);pointer-events:auto;}
#scroll-top:hover{border-color:var(--violet);}
#scroll-top svg{width:13px;height:13px;fill:none;stroke:var(--dim);stroke-width:1.5;}
#scroll-top:hover svg{stroke:var(--ghost);}
@media(max-width:700px){#scroll-top{bottom:1rem;right:1rem;width:36px;height:36px;}}

/* 画像プレースホルダー */
img{background:rgba(184,159,255,0.05);}


/* ════ MOBILE UX EXTRA ════ */
@media(max-width:700px){
  /* フォントサイズ読みやすく */
  body{font-size:16px;-webkit-text-size-adjust:100%;}
  /* セクションパディング縮小 */
  .sec-pad{padding:72px 1.2rem 60px!important;}
  .page-header{padding:84px 1.2rem 24px!important;}
  .ab-wrap{padding:84px 1.2rem 60px!important;}
  .ct-wrap{padding:84px 1.2rem 60px!important;}
  /* ヒーローパディング */
  .hero-inner{padding:100px 1.2rem 72px!important;}
  /* グリッドを1列に */
  .works-grid,#worksGrid,.fg-grid,.feat-grid{grid-template-columns:1fr!important;}
  /* ボタン横幅フル */
  .btn-primary,.btn-ghost,.btn-all-works,.form-submit,.ct-submit{
    width:100%;justify-content:center;text-align:center;
  }
  /* 入力欄の文字サイズ（iOS ズーム防止） */
  input,textarea,select{font-size:16px!important;}
  /* カード内の動画比率維持 */
  .wcard-thumb,.dc-thumb,.fg-thumb,.wp-thumb{aspect-ratio:16/9;}
  /* スクロールバー細く */
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:rgba(184,159,255,0.3);border-radius:2px;}
  /* footer */
  footer{flex-direction:column;gap:0.5rem;text-align:center;padding:1.2rem;}
  /* navロゴサイズ */
  .logo{font-size:1.1rem;}
}


/* ── mobile-nav-fix ── */
@media(max-width:700px){
  .logo{display:none!important;}
  .nav-hamburger{display:none!important;}
  .nav-overlay{display:none!important;}
  nav{padding:0!important;justify-content:stretch!important;}
  nav::after{left:0!important;right:0!important;}
  .nav-links{
    position:static!important;transform:none!important;
    flex-direction:row!important;background:none!important;
    backdrop-filter:none!important;border:none!important;
    padding:0!important;gap:0!important;width:100%!important;
    display:flex!important;overflow-x:auto!important;scrollbar-width:none!important;
  }
  .nav-links::-webkit-scrollbar{display:none;}
  .nav-links li{
    flex:1!important;flex-shrink:0!important;
    border:none!important;width:auto!important;min-width:0!important;
  }
  .nav-links a{

var UI_STATE_KEY='cs4w_discography_state';

try{savedUIState=JSON.parse(localStorage.getItem(UI_STATE_KEY)||'{}');}catch(ex){}
let sortOrder=savedUIState.sort==='asc'?'asc':'desc';
let favoriteOnly=!!savedUIState.favoriteOnly;

var SHARE_SVG='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>';

function esc(value){
  return String(value||'').replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});
}

function getTrackById(ytId){return TRACKS.find(function(track){return track.ytId===ytId;})||null;}

function renderTrackCard(track){
  var titleClass='dc-title'+(track.longTitle?' dc-title-long':'');
  var meta='<span class="dc-date">'+esc(track.date)+'</span>'+(track.note?'<span class="dc-note">'+esc(track.note)+'</span>':'');
  var details=(track.collab?'<p class="dc-collab">'+esc(track.collab)+'</p>':'')+(track.platform?'<p class="dc-platform">'+esc(track.platform)+'</p>':'');
  return '<article class="dc-card" data-yt-id="'+esc(track.ytId)+'" data-source-index="'+track.sourceIndex+'" data-date="'+esc(track.date)+'" data-title="'+esc(track.name.toLowerCase())+'" data-year="'+esc(track.date.slice(0,4))+'" data-genre="'+esc(track.genre||'')+'" data-game="'+esc(track.game||'')+'">'+
    '<div class="dc-media"><button class="dc-thumb" type="button" data-play-id="'+esc(track.ytId)+'" title="'+esc(track.name)+'" aria-label="'+esc(track.name)+'を再生">'+
    '<img src="https://img.youtube.com/vi/'+esc(track.ytId)+'/mqdefault.jpg" alt="'+esc(track.name)+'" loading="lazy"><span class="dc-play" aria-hidden="true"><span>▶</span></span></button></div>'+
    '<div class="dc-info"><div class="dc-meta-row">'+meta+'</div><h3 class="'+titleClass+'" title="'+esc(track.name)+'">'+esc(track.name)+'</h3>'+details+
    '<div class="dc-btn-row"><button class="share-btn" type="button" data-share-id="'+esc(track.ytId)+'" aria-label="'+esc(track.name)+'をシェア">'+SHARE_SVG+'シェア</button>'+
    '<button class="like-btn" type="button" data-id="'+esc(track.likeId||track.ytId)+'" aria-label="いいね"><span class="lheart">♡</span><span class="lcnt">0</span></button></div></div></article>';
}

function renderTrackCards(){
  var grid=document.getElementById('dcGrid');
  if(!grid)return;
  grid.innerHTML=TRACKS.map(renderTrackCard).join('');
  var total=document.querySelector('.ph-count em');
  if(total)total.textContent=TRACKS.length;
}

function saveUIState(){
  localStorage.setItem(UI_STATE_KEY,JSON.stringify({
    sort:sortOrder,
    search:document.getElementById('searchBox').value,
    genre:document.getElementById('genreFilter').value,
    game:document.getElementById('gameFilter').value,
    favoriteOnly:favoriteOnly
  }));
}

function restoreUIState(){
  document.getElementById('searchBox').value=savedUIState.search||'';
  document.getElementById('genreFilter').value=savedUIState.genre||'';
  document.getElementById('gameFilter').value=savedUIState.game||'';
  document.querySelectorAll('[data-sort]').forEach(function(btn){btn.classList.toggle('active',btn.dataset.sort===sortOrder);});
  updateFavoriteFilterButton();
}

function updateFavoriteFilterButton(){
  var favoriteBtn=document.getElementById('favoriteFilterBtn');
  favoriteBtn.classList.toggle('active',favoriteOnly);
  favoriteBtn.setAttribute('aria-pressed',String(favoriteOnly));
}

function setSort(order,btn){
  sortOrder=order;
  document.querySelectorAll('[data-sort]').forEach(function(b){b.classList.toggle('active',b===btn);});
  rerender();
}

function toggleFavoriteFilter(){
  favoriteOnly=!favoriteOnly;
  updateFavoriteFilterButton();
  rerender();
}

function rerender(){
  var q=document.getElementById('searchBox').value.toLowerCase().trim();
  var genre=document.getElementById('genreFilter').value;
  var game=document.getElementById('gameFilter').value;
  var grid=document.getElementById('dcGrid');
  if(!grid)return;
  var all=Array.from(grid.querySelectorAll(':scope > .dc-card'));
  all.sort(function(a,b){
    var dateCompare=sortOrder==='desc'?b.dataset.date.localeCompare(a.dataset.date):a.dataset.date.localeCompare(b.dataset.date);
    if(dateCompare)return dateCompare;
    return Number(a.dataset.sourceIndex||0)-Number(b.dataset.sourceIndex||0);
  });
  all.forEach(function(card){grid.appendChild(card);});
  var shown=0;
  all.forEach(function(card){
    var track=getTrackById(card.dataset.ytId);
    var text=[card.dataset.title,card.dataset.year,track&&track.platform,track&&track.collab,track&&track.note].join(' ').toLowerCase();
    var match=(!q||text.includes(q))&&(!genre||(card.dataset.genre||'').includes(genre))&&(!game||(card.dataset.game||'').includes(game));
    if(favoriteOnly)match=match&&!!(track&&LIKES[(track.likeId||track.ytId)+'_voted']);
    card.style.display=match?'':'none';
    if(match)shown++;
  });
  var nr=document.getElementById('noResults');
  if(!shown){
    if(!nr){nr=document.createElement('div');nr.id='noResults';nr.className='no-results';nr.textContent='No results.';}
    grid.appendChild(nr);
  }else if(nr&&nr.parentNode){nr.parentNode.removeChild(nr);}
  var badge=document.getElementById('countBadge');
  if(badge)badge.innerHTML=(!q&&!genre&&!game&&!favoriteOnly)?'全 <em>'+all.length+'</em> 曲':'<em>'+shown+'</em> / '+all.length+' 曲';
  saveUIState();
  if(typeof mpUpdateCardState==="function"&&typeof MP!=="undefined")mpUpdateCardState();
}

renderTrackCards();
restoreUIState();
initLikes();
document.getElementById('searchBox').addEventListener('input',rerender);
document.getElementById('dcGrid').addEventListener('click',function(event){
  var play=event.target.closest('[data-play-id]');
  if(play){mpOpenTrack(play.dataset.playId);return;}
  var share=event.target.closest('[data-share-id]');
  if(share){shareTrackById(share.dataset.shareId);return;}
  var like=event.target.closest('.like-btn');
  if(like){toggleLike(like);}
});
rerender();

/* ════ SHARED UX JS ════ */
(function(){
  var PAGE_ORDER = ['../', '../works/', '../discography/', '../about/', '../contact/'];
  var CURRENT_FILE = '../discography/';

  /* ── ページ遷移フェード ── */
  var pf = document.getElementById('page-fade');
  function goPage(href){
    if(!pf) { window.location.href = href; return; }
    pf.classList.add('on');
    setTimeout(function(){ window.location.href = href; }, 320);
  }
  if(pf){
    // bfcache から復元された時に真っ暗のまま固まるのを防ぐ
    window.addEventListener('pageshow', function(e){
      pf.style.transition = 'none';
      pf.classList.remove('on');
      setTimeout(function(){ pf.style.transition = ''; }, 50);
    });
    document.querySelectorAll('a[href]').forEach(function(a){
      var href = a.getAttribute('href') || '';
      if(!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
      a.addEventListener('click', function(e){ e.preventDefault(); goPage(href); });
    });
  }

  /* ── ナビシュリンク ── */
  var navEl = document.querySelector('nav');
  var stBtn = document.getElementById('scroll-top');
  window.addEventListener('scroll', function(){
    if(navEl) navEl.classList.toggle('scrolled', window.scrollY > 60);
    if(stBtn) stBtn.classList.toggle('vis', window.scrollY > 400);
  }, {passive:true});
  if(stBtn) stBtn.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });

  /* ── アクティブセクション ── */
  var secs  = document.querySelectorAll('section[id]');
  var links = document.querySelectorAll('.nav-links a[href^="#"]');
  if(secs.length && links.length){
    var io3 = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          links.forEach(function(l){ l.classList.remove('section-active'); });
          var a = document.querySelector('.nav-links a[href="#'+e.target.id+'"]');
          if(a) a.classList.add('section-active');
        }
      });
    },{threshold:0.3});
    secs.forEach(function(s){ io3.observe(s); });
  }

  /* ── ハンバーガー ── */
  var hbtn = document.getElementById('nav-hamburger');
  var menu = document.querySelector('.nav-links');
  var nov  = document.getElementById('nav-overlay');
  if(hbtn){
    function togMenu(open){
      hbtn.classList.toggle('open',open);
      if(menu) menu.classList.toggle('open',open);
      if(nov)  nov.classList.toggle('open',open);
      hbtn.setAttribute('aria-expanded',open);
      document.body.style.overflow = open ? 'hidden' : '';
    }
    hbtn.addEventListener('click', function(){ togMenu(!hbtn.classList.contains('open')); });
    if(nov) nov.addEventListener('click', function(){ togMenu(false); });
    document.querySelectorAll('.nav-links a').forEach(function(a){
      a.addEventListener('click', function(){ togMenu(false); });
    });
  }

  /* ── スワイプナビゲーション ── */
  var swipeStartX = 0, swipeStartY = 0;
  var SWIPE_THRESHOLD = 60;
  document.addEventListener('touchstart', function(e){
    swipeStartX = e.changedTouches[0].clientX;
    swipeStartY = e.changedTouches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - swipeStartX;
    var dy = e.changedTouches[0].clientY - swipeStartY;
    if(Math.abs(dx) < SWIPE_THRESHOLD || Math.abs(dy) > Math.abs(dx) * 0.8) return;
    // ctrl-bar / social-bar / mini-player 上のスワイプは無視
    var t = e.target;
    while(t && t !== document.body){
      var tc = (typeof t.className==='string') ? t.className : '';
      var ti = t.id || '';
      if(ti==='social-bar'||ti==='mini-player'||
         tc.indexOf('ctrl-')>=0||tc.indexOf('sort-btn')>=0||
         tc.indexOf('filter-btn')>=0||tc.indexOf('ctrl-select')>=0||
         tc.indexOf('search-box')>=0||tc.indexOf('ctrl-bar')>=0){
        return;
      }
      t = t.parentElement;
    }
    var idx = PAGE_ORDER.indexOf(CURRENT_FILE);
    if(idx < 0) return;
    if(dx < 0 && idx < PAGE_ORDER.length-1) goPage(PAGE_ORDER[idx+1]);
    if(dx > 0 && idx > 0) goPage(PAGE_ORDER[idx-1]);
  }, {passive:true});

})();

/* ── Like (共有いいね: Cloudflare KV) ── */
function saveLikes(){ localStorage.setItem('cs4w_likes', JSON.stringify(LIKES)); }

// サーバーからいいね数を取得してボタンに反映
function initLikes(){
  // まず手元のlocalStorageで「自分がいいねしたか」だけ反映
  document.querySelectorAll('.like-btn').forEach(function(btn){
    var id = btn.dataset.id;
    if(LIKES[id+'_voted']) btn.classList.add('liked');
    btn.querySelector('.lcnt').textContent = '…';
  });
  // サーバーから合計数を取得
  fetch(WORKER_LIKES_URL + '/get')
    .then(function(r){ return r.json(); })
    .then(function(data){
      LIKES_COUNTS = data;
      document.querySelectorAll('.like-btn').forEach(function(btn){
        var id = btn.dataset.id;
        btn.querySelector('.lcnt').textContent = data[id] || 0;
      });
    })
    .catch(function(){
      // 失敗時はローカルの数を表示
      document.querySelectorAll('.like-btn').forEach(function(btn){
        var id = btn.dataset.id;
        btn.querySelector('.lcnt').textContent = LIKES[id] || 0;
      });
    });
}

function toggleLike(btn){
  var id = btn.dataset.id;
  var voted = !!LIKES[id+'_voted'];
  var action = voted ? 'remove' : 'add';

  // UIを即反映（楽観的更新）
  if(voted){
    delete LIKES[id+'_voted'];
    btn.classList.remove('liked');
    LIKES_COUNTS[id] = Math.max(0, (LIKES_COUNTS[id]||1) - 1);
  } else {
    LIKES[id+'_voted'] = true;
    btn.classList.add('liked');
    LIKES_COUNTS[id] = (LIKES_COUNTS[id]||0) + 1;
  }
  btn.querySelector('.lcnt').textContent = LIKES_COUNTS[id] || 0;
  saveLikes();
  if(favoriteOnly) rerender();

  // サーバーに送信
  fetch(WORKER_LIKES_URL + '/toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id, action: action })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    // サーバーの正確な数で上書き
    LIKES_COUNTS[id] = data.count;
    btn.querySelector('.lcnt').textContent = data.count;
  })
  .catch(function(){
    // 通信失敗してもUIはそのまま
  });
}

function trackURL(ytId){
  var url=new URL(location.href);
  url.searchParams.set('track',ytId);
  url.hash='';
  return url.toString();
}

function shareTrackById(ytId){
  var track=getTrackById(ytId);
  if(!track)return;
  var tw='https://twitter.com/intent/tweet?text='+encodeURIComponent('CS4W - '+track.name)+'&url='+encodeURIComponent(trackURL(ytId))+'&hashtags=CS4W';
  window.open(tw,'_blank','width=550,height=420');
}

function mpOpenTrack(ytId){
  var track=getTrackById(ytId);
  if(track)mpOpen(track.ytId,track.name,track.playerLabel||'');
}

/* ── Mini Player ── */
var MP={ytId:null,title:'',plat:'',playing:false,inited:false,muted:false,vol:70,iframe:null,player:null,playerReady:false,pendingStart:false,dur:0,seekTimer:null,mode:localStorage.getItem('cs4w_play_mode')==='shuffle'?'shuffle':'sequence',endedHandled:false,history:[],historyIndex:-1,historyNavigating:false};

var MP_PLAY_SVG  = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
var MP_PAUSE_SVG = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

function mpFmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function mpTrackCard(ytId){
  return Array.from(document.querySelectorAll('.dc-card')).find(function(card){return card.dataset.ytId===ytId;})||null;
}

function mpUpdateCardState(){
  document.querySelectorAll('.dc-card.is-current,.dc-card.is-playing').forEach(function(card){
    card.classList.remove('is-current','is-playing');
  });
  if(!MP.ytId)return;
  var card=mpTrackCard(MP.ytId);
  if(!card)return;
  card.classList.add('is-current');
  if(MP.playing)card.classList.add('is-playing');
  if(!card.querySelector('.dc-now-playing')){
    var wave=document.createElement('div');
    wave.className='dc-now-playing';
    wave.setAttribute('aria-hidden','true');
    wave.innerHTML='<span></span><span></span><span></span><span></span><span></span>';
    var media=card.querySelector('.dc-media');
    if(media)media.appendChild(wave);
  }
}

function mpVisibleTrackIds(){
  var ids=Array.from(document.querySelectorAll('#dcGrid > .dc-card')).filter(function(card){return card.style.display!=='none';}).map(function(card){return card.dataset.ytId;});
  return ids.indexOf(MP.ytId)>=0?ids:TRACKS.map(function(track){return track.ytId;});
}

function mpUpdateModeButton(){
  var btn=document.getElementById('mp-shuffle-btn');
  if(!btn)return;
  var active=MP.mode==='shuffle';
  btn.classList.toggle('is-active',active);
  btn.setAttribute('aria-pressed',String(active));
  btn.title=active?'ランダム再生中':'順番再生中';
}

function mpToggleShuffle(){
  MP.mode=MP.mode==='shuffle'?'sequence':'shuffle';
  localStorage.setItem('cs4w_play_mode',MP.mode);
  mpUpdateModeButton();
}

function mpMove(direction){
  var ids=mpVisibleTrackIds();
  if(!ids.length)return;
  var nextId;
  if(MP.mode==='shuffle'&&ids.length>1){
    var choices=ids.filter(function(id){return id!==MP.ytId;});
    nextId=choices[Math.floor(Math.random()*choices.length)];
  }else{
    var index=ids.indexOf(MP.ytId);
    if(index<0)index=direction>0?-1:0;
    nextId=ids[(index+direction+ids.length)%ids.length];
  }
  if(nextId===MP.ytId&&MP.playerReady){
    MP.player.seekTo(0,true);MP.player.playVideo();return;
  }
  mpOpenTrack(nextId);
}

function mpRecordHistory(ytId){
  if(MP.history[MP.historyIndex]===ytId)return;
  MP.history=MP.history.slice(0,MP.historyIndex+1);
  MP.history.push(ytId);
  if(MP.history.length>100)MP.history.shift();
  MP.historyIndex=MP.history.length-1;
}

function mpOpenHistory(index){
  if(index<0||index>=MP.history.length)return false;
  MP.historyIndex=index;
  MP.historyNavigating=true;
  mpOpenTrack(MP.history[index]);
  return true;
}

function mpNext(){
  if(MP.mode==='shuffle'&&MP.historyIndex<MP.history.length-1&&mpOpenHistory(MP.historyIndex+1))return;
  mpMove(1);
}

function mpPrevious(){
  if(MP.mode==='shuffle'){
    if(MP.historyIndex>0)mpOpenHistory(MP.historyIndex-1);
    else if(MP.playerReady){MP.player.seekTo(0,true);MP.player.playVideo();}
    return;
  }
  mpMove(-1);
}

function mpHandleEnded(){
  if(MP.endedHandled)return;
  MP.endedHandled=true;
  setTimeout(mpNext,120);
}

function mpOpen(ytId,title,plat){
  if(!MP||!ytId)return;
  if(MP.historyNavigating)MP.historyNavigating=false;
  else mpRecordHistory(ytId);
  MP.ytId=ytId;MP.title=title;MP.plat=plat||'';
  MP.playing=false;MP.inited=false;MP.dur=0;MP.endedHandled=false;
  clearInterval(MP.seekTimer);MP.seekTimer=null;
  document.getElementById('mp-title').textContent=title;
  document.getElementById('mp-plat').textContent=plat||'';
  document.getElementById('mp-play-btn').innerHTML=MP_PLAY_SVG;
  document.getElementById('mp-cur').textContent='0:00';
  document.getElementById('mp-dur').textContent='0:00';
  var sk=document.getElementById('mp-seek');
  sk.value=0;sk.style.setProperty('--s','0%');
  if(!MP.player){
    document.getElementById('mp-art').innerHTML='<img src="https://img.youtube.com/vi/'+ytId+'/mqdefault.jpg" alt="'+String(title).replace(/"/g,'&quot;')+'">';
  }
  document.getElementById('mini-player').classList.add('mp-active');
  var pageUrl=new URL(location.href);
  pageUrl.searchParams.set('track',ytId);
  history.replaceState({track:ytId},'',pageUrl);
  mpUpdateModeButton();
  mpUpdateCardState();
  mpTogglePlay();
}

function mpTogglePlay(){
  if(!MP.ytId)return;
  var btn=document.getElementById('mp-play-btn');
  if(!MP.inited){
    MP.inited=true;
    MP.pendingStart=true;
    btn.innerHTML=MP_PAUSE_SVG;
    if(MP.playerReady)mpStartPlayer();
    else mpEnsureYouTubeAPI();
    return;
  } else {
    if(MP.playing){
      mpSendCmd('pauseVideo');
      MP.playing=false;
      btn.innerHTML=MP_PLAY_SVG;
      mpUpdateCardState();
    } else {
      mpSendCmd('playVideo');
      MP.playing=true;
      btn.innerHTML=MP_PAUSE_SVG;
      mpUpdateCardState();
    }
  }
}

function mpEnsureYouTubeAPI(){
  if(window.YT&&typeof YT.Player==='function'){
    mpCreatePlayer();
    return;
  }
  if(!document.getElementById('youtube-iframe-api')){
    var tag=document.createElement('script');
    tag.id='youtube-iframe-api';
    tag.src='https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  }
}

window.onYouTubeIframeAPIReady=function(){
  mpCreatePlayer();
};

function mpCreatePlayer(){
  if(MP.player)return;
  var slot=document.getElementById('mp-art');
  slot.innerHTML='<div id="mp-youtube-player"></div>';
  MP.player=new YT.Player('mp-youtube-player',{
    width:200,
    height:200,
    playerVars:{
      autoplay:0,
      controls:0,
      playsinline:1,
      rel:0,
      modestbranding:1,
      iv_load_policy:3,
      origin:location.origin
    },
    events:{
      onReady:function(e){
        MP.iframe=e.target.getIframe();
        MP.playerReady=true;
        if(MP.pendingStart)mpStartPlayer();
      },
      onStateChange:function(e){
        var btn=document.getElementById('mp-play-btn');
        if(e.data===YT.PlayerState.ENDED){
          MP.playing=false;
          if(btn)btn.innerHTML=MP_PLAY_SVG;
          mpUpdateCardState();
          mpHandleEnded();
          return;
        }
        MP.playing=e.data===YT.PlayerState.PLAYING;
        if(btn)btn.innerHTML=MP.playing?MP_PAUSE_SVG:MP_PLAY_SVG;
        mpUpdateCardState();
      },
      onError:function(){
        MP.playing=false;
        var btn=document.getElementById('mp-play-btn');
        if(btn)btn.innerHTML=MP_PLAY_SVG;
        mpUpdateCardState();
      }
    }
  });
}

function mpStartPlayer(){
  if(!MP.playerReady||!MP.pendingStart||!MP.ytId)return;
  MP.pendingStart=false;
  MP.player.setVolume(MP.vol);
  MP.player.mute();
  MP.player.loadVideoById(MP.ytId);
  MP.player.playVideo();
  if(!MP.muted){
    setTimeout(function(){
      if(MP.playerReady){
        MP.player.unMute();
        MP.player.setVolume(MP.vol);
      }
    },250);
  }
  clearInterval(MP.seekTimer);
  MP.seekTimer=setInterval(mpPollTime,500);
}

window.addEventListener('load',mpEnsureYouTubeAPI);

function mpSendCmd(func, args){
  if(MP.player&&typeof MP.player[func]==='function'){
    MP.player[func].apply(MP.player,args||[]);
    return;
  }
  if(MP.iframe&&MP.iframe.contentWindow){
    MP.iframe.contentWindow.postMessage(
      JSON.stringify({event:'command',func:func,args:args||[]}),
      '*'
    );
  }
}

function mpPollTime(){
  if(MP.player&&typeof MP.player.getCurrentTime==='function'){
    var current=MP.player.getCurrentTime()||0;
    var duration=MP.player.getDuration()||0;
    if(duration>0)MP.dur=duration;
    if(MP.dur>0){
      var pct=(current/MP.dur)*100;
      var seek=document.getElementById('mp-seek');
      if(seek&&!mpSeekDragging){
        seek.value=pct;
        seek.style.setProperty('--s',pct.toFixed(1)+'%');
      }
      document.getElementById('mp-cur').textContent=mpFmt(current);
      document.getElementById('mp-dur').textContent=mpFmt(MP.dur);
    }
    return;
  }
  // YouTube IFrame API の時間取得は postMessage ではなく
  // iframe.contentWindow.YT経由が理想だが
  // クロスオリジンのためYT.Player オブジェクトを使う
  if(!MP.iframe) return;
  // YT Player API経由で時間取得
  try{
    var win = MP.iframe.contentWindow;
    // getCurrentTime / getDuration をpostMessageで要求
    win.postMessage(JSON.stringify({event:'listening'}),'*');
    win.postMessage(JSON.stringify({event:'command',func:'getCurrentTime',args:[]}),'*');
  }catch(e){}
}

// YouTube IFrame からの応答を受信
window.addEventListener('message', function(e){
  if(!e.data) return;
  var data;
  try{ data = typeof e.data==='string' ? JSON.parse(e.data) : e.data; }
  catch(err){ return; }

  // YT IFrame API の応答形式
  if(data.event === 'onStateChange'){
    if(data.info === 0){ // ended
      MP.playing=false;
      var btn=document.getElementById('mp-play-btn');
      if(btn) btn.innerHTML=MP_PLAY_SVG;
      mpUpdateCardState();
      mpHandleEnded();
    }
    if(data.info === 1){ // playing
      MP.playing=true;
      var btn=document.getElementById('mp-play-btn');
      if(btn) btn.innerHTML=MP_PAUSE_SVG;
    }
    if(data.info === 2){ // paused
      MP.playing=false;
      var btn=document.getElementById('mp-play-btn');
      if(btn) btn.innerHTML=MP_PLAY_SVG;
    }
  }
  if(data.event === 'infoDelivery' && data.info){
    var info=data.info;
    if(info.duration && info.duration > 0) MP.dur=info.duration;
    if(info.currentTime != null && MP.dur > 0){
      var pct=(info.currentTime/MP.dur)*100;
      var sk=document.getElementById('mp-seek');
      if(sk && !mpSeekDragging){
        sk.value=pct;
        sk.style.setProperty('--s',pct.toFixed(1)+'%');
      }
      document.getElementById('mp-cur').textContent=mpFmt(info.currentTime);
      document.getElementById('mp-dur').textContent=mpFmt(MP.dur);
    }
  }
});

// シークバーのドラッグ中は更新しない
var mpSeekDragging = false;
(function(){
  var sk = document.getElementById('mp-seek');
  if(!sk) return;
  sk.addEventListener('mousedown', function(){ mpSeekDragging=true; });
  sk.addEventListener('touchstart', function(){ mpSeekDragging=true; },{passive:true});
  sk.addEventListener('mouseup', function(){ mpSeekDragging=false; });
  sk.addEventListener('touchend', function(){ mpSeekDragging=false; },{passive:true});
})();

function mpSeek(val){
  var pct=parseFloat(val);
  document.getElementById('mp-seek').style.setProperty('--s',pct.toFixed(1)+'%');
  if(MP.dur>0){
    var sec=(pct/100)*MP.dur;
    mpSendCmd('seekTo',[sec,true]);
  }
}

function mpSetVolume(val){
  MP.vol=parseInt(val);
  var icon=document.getElementById('mp-vol-icon');
  if(icon) icon.textContent=MP.vol===0?'🔇':MP.vol<40?'🔉':'🔊';
  document.getElementById('mp-vol').style.setProperty('--v',MP.vol+'%');
  mpSendCmd('setVolume',[MP.vol]);
}

function mpToggleMute(){
  MP.muted=!MP.muted;
  var icon=document.getElementById('mp-vol-icon');
  if(icon) icon.textContent=MP.muted?'🔇':MP.vol<40?'🔉':'🔊';
  mpSendCmd(MP.muted?'mute':'unMute',[]);
}

function mpOpenYT(){
  if(MP.ytId) window.open('https://www.youtube.com/watch?v='+MP.ytId,'_blank');
}

function mpClose(){
  clearInterval(MP.seekTimer);MP.seekTimer=null;
  MP.pendingStart=false;
  if(MP.playerReady){ try{MP.player.stopVideo();}catch(ex){} }
  MP.ytId=null;MP.playing=false;MP.inited=false;MP.dur=0;
  MP.history=[];MP.historyIndex=-1;MP.historyNavigating=false;
  mpUpdateCardState();
  var p=document.getElementById('mini-player');
  if(p) p.classList.remove('mp-active');
  var pageUrl=new URL(location.href);
  pageUrl.searchParams.delete('track');
  history.replaceState({},'',pageUrl);
}

function openTrackFromURL(){
  var ytId=new URL(location.href).searchParams.get('track');
  var track=getTrackById(ytId);
  if(!track)return;
  var card=mpTrackCard(ytId);
  if(card&&card.style.display==='none'){
    card.style.display='';
    card.dataset.directVisible='true';
    var noResults=document.getElementById('noResults');
    if(noResults&&noResults.parentNode)noResults.parentNode.removeChild(noResults);
    var visibleCount=Array.from(document.querySelectorAll('#dcGrid > .dc-card')).filter(function(item){return item.style.display!=='none';}).length;
    var badge=document.getElementById('countBadge');
    if(badge)badge.innerHTML='<em>'+visibleCount+'</em> / '+TRACKS.length+' 曲';
  }
  mpOpenTrack(ytId);
  card=mpTrackCard(ytId);
  if(card)setTimeout(function(){card.scrollIntoView({behavior:'smooth',block:'center'});},100);
}

document.addEventListener('keydown',function(event){
  var target=event.target;
  if(target&&(/INPUT|SELECT|TEXTAREA|BUTTON/.test(target.tagName)||target.isContentEditable))return;
  if(!MP.ytId)return;
  if(event.code==='Space'){
    event.preventDefault();mpTogglePlay();
  }else if(event.key==='ArrowRight'||event.key==='ArrowLeft'){
    event.preventDefault();
    if(MP.playerReady){
      var delta=event.key==='ArrowRight'?5:-5;
      MP.player.seekTo(Math.max(0,Math.min(MP.dur||Infinity,MP.player.getCurrentTime()+delta)),true);
    }
  }else if(event.key==='ArrowUp'||event.key==='ArrowDown'){
    event.preventDefault();
    var deltaVolume=event.key==='ArrowUp'?5:-5;
    var nextVolume=Math.max(0,Math.min(100,MP.vol+deltaVolume));
    document.getElementById('mp-vol').value=nextVolume;
    mpSetVolume(nextVolume);
  }
});

window.addEventListener('load',function(){mpUpdateModeButton();openTrackFromURL();});

</script>

<!-- Mini Player -->
<div id="mini-player">
  <div class="mp-main-row">
    <div class="mp-art" id="mp-art"></div>
    <div class="mp-info">
      <div class="mp-title" id="mp-title">-</div>
      <div class="mp-plat" id="mp-plat"></div>
    </div>
    <div class="mp-controls">
      <button class="mp-btn" id="mp-shuffle-btn" onclick="mpToggleShuffle()" aria-label="ランダム再生" aria-pressed="false" title="順番再生中">
        <svg viewBox="0 0 24 24"><path d="M16 3h5v5h-2V6.41l-4.3 4.3-1.4-1.42L17.59 5H16V3zM3 6h3.5c1.9 0 3.14.82 4.21 2.08l-1.46 1.37C8.45 8.53 7.72 8 6.5 8H3V6zm16 9.59-4.29-4.3-1.42 1.42 4.3 4.29H16v2h5v-5h-2v1.59zM3 16h3.5c1.22 0 1.95-.53 2.75-1.45l4.04-4.84-1.54-1.28-4.04 4.84C8.1 14 7.54 14 6.5 14H3v2z"/></svg>
      </button>
      <button class="mp-btn" id="mp-prev-btn" onclick="mpPrevious()" aria-label="前の曲" title="前の曲">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="mp-btn" id="mp-play-btn" onclick="mpTogglePlay()" aria-label="Play / Pause">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="mp-btn" id="mp-next-btn" onclick="mpNext()" aria-label="次の曲" title="次の曲">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
      </button>
      <button class="mp-btn mp-external-btn" onclick="mpOpenYT()" aria-label="YouTubeで開く" title="YouTubeで開く">
        <svg viewBox="0 0 24 24"><path d="M10 6v2H5v11h11v-5h2v7H3V6h7zm11-3v8h-2V6.413l-7.793 7.794-1.414-1.414L17.585 5H13V3h8z"/></svg>
      </button>
    </div>
    <div class="mp-vol-wrap">
      <span class="mp-vol-icon" id="mp-vol-icon" onclick="mpToggleMute()">Vol</span>
      <input type="range" id="mp-vol" min="0" max="100" value="70" oninput="mpSetVolume(this.value)" aria-label="Volume">
    </div>
    <button id="mp-close" onclick="mpClose()" aria-label="Close">x</button>
  </div>
  <div class="mp-seek-row">
    <span class="mp-time" id="mp-cur">0:00</span>
    <input type="range" id="mp-seek" min="0" max="100" value="0" step="0.1" oninput="mpSeek(this.value)" aria-label="Seek">
    <span class="mp-time" id="mp-dur">0:00</span>
  </div>
</div>

<button id="scroll-top" aria-label="Page top"><svg viewBox="0 0 14 14"><polyline points="2,10 7,4 12,10"/></svg></button>
<div id="swipe-indicator">swipe</div>
